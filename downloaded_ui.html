<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JobApply Assistant Chatbot UI</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter for a clean modern look similar to the image -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<style data-purpose="global-styles">
    body {
      font-family: 'Inter', sans-serif;
      background-color: white;
    }
    /* Hide scrollbar for cleaner look */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
<style data-purpose="chat-bubbles">
    .bot-message {
      background-color: #f4f4f5;
      color: #18181b;
      border-radius: 12px 12px 12px 4px;
    }
    .suggested-action {
      border: 1px solid #e4e4e7;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.875rem;
      color: #18181b;
      background: white;
      transition: background-color 0.2s;
    }
    .suggested-action:hover {
      background-color: #f9fafb;
    }
  </style>
</head>
<body class="h-screen overflow-hidden">
<!-- BEGIN: Chat Container -->
<main class="w-full h-full bg-white flex flex-col relative" data-purpose="chatbot-main-window">
<!-- BEGIN: MainHeader -->
<header class="bg-black text-white p-4 flex items-center justify-between z-10 shrink-0" data-purpose="header-section">
<div class="flex items-center gap-3">
<!-- Profile Icon / Logo Placeholder -->
<div class="w-8 h-8 bg-white rounded-full flex items-center justify-center overflow-hidden">
<span class="text-black font-bold text-sm">C</span>
</div>
<div>
<h1 class="text-sm font-semibold">JobApply Assistant</h1>
</div>
</div>
<div class="flex items-center gap-4">
<!-- Options and Close -->
<button class="text-gray-400 hover:text-white">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
</button>
<button class="text-gray-400 hover:text-white">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
</button>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: Message Thread -->
<section class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 no-scrollbar" data-purpose="chat-history">
<!-- Bot Intro Message 1 -->
<div class="flex flex-col items-start max-w-[85%]">
<div class="bot-message p-3 text-sm shadow-sm">
          👋 Hey! Want to deploy a conversational AI agent?
        </div>
</div>
<!-- Bot Intro Message 2 -->
<div class="flex flex-col items-start max-w-[85%]">
<div class="bot-message p-3 text-sm shadow-sm">
          Tell me your use case and I'll help you figure out if JobApply is the right fit.
        </div>
</div>
<!-- Spacer for visual balance -->
<div class="mt-auto"></div>
<!-- BEGIN: Suggested Actions -->
<div class="flex flex-col items-end gap-2 mb-4" data-purpose="quick-replies">
<button class="suggested-action">How can JobApply help me?</button>
<button class="suggested-action">What integrations does JobApply offer?</button>
<div class="flex gap-2">
<button class="suggested-action">Is there a free plan?</button>
<button class="suggested-action">Can I see a demo?</button>
</div>
</div>
<!-- END: Suggested Actions -->
<!-- Brand Footer Link -->
<div class="flex justify-center mb-2">
<a class="flex items-center gap-1 text-[10px] text-gray-500 bg-gray-100 px-2 py-1 rounded-md" href="#">
<div class="w-3 h-3 bg-gray-400 rounded-sm flex items-center justify-center text-[8px] text-white font-bold">C</div>
          Powered by Chatbase
        </a>
</div>
</section>
<!-- END: Message Thread -->
<!-- BEGIN: Input Footer -->
<footer class="p-3 border-t border-gray-100 bg-white shrink-0 pb-safe" data-purpose="input-section">
<!-- Privacy Policy Banner -->
<div class="flex justify-between items-center px-1 mb-2 text-[11px] text-gray-500">
<span>By chatting, you agree to our <a class="underline" href="#">privacy policy</a>.</span>
<button class="text-gray-400">
<svg fill="none" height="12" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="12" xmlns="http://www.w3.org/2000/svg"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
</button>
</div>
<!-- Input Bar -->
<div class="relative flex items-center bg-gray-50 border border-gray-200 rounded-full px-4 py-2 gap-2">
<!-- Attachment Icon -->
<button class="text-gray-400 hover:text-gray-600" title="Attach file">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
</button>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-sm placeholder:text-gray-400 py-1" placeholder="Ask me anything about JobApply" type="text"/>
<!-- Voice / Send Group -->
<div class="flex items-center gap-2">
<button class="text-gray-400 hover:text-gray-600" title="Voice message">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="23"></line><line x1="8" x2="16" y1="23" y2="23"></line></svg>
</button>
<!-- Chat Button / Icon -->
<button class="w-8 h-8 bg-black rounded-full flex items-center justify-center text-white">
<svg fill="none" height="14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="14" xmlns="http://www.w3.org/2000/svg"><path d="M12 3v18"></path><path d="M16 8v8"></path><path d="M8 8v8"></path><path d="M20 10v4"></path><path d="M4 10v4"></path></svg>
</button>
</div>
</div>
</footer>
<!-- END: Input Footer -->
</main>
<!-- END: Chat Container -->
</body></html>
