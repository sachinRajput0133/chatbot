name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            cd /root/chatbot

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building widget..."
            cd apps/widget
            npm install --silent
            npm run build
            cd ../..

            echo "==> Copying widget to api/widget_dist..."
            mkdir -p apps/api/widget_dist
            cp apps/widget/dist/widget.js apps/api/widget_dist/widget.js

            echo "==> Rebuilding and restarting API..."
            docker compose build api
            docker compose up -d --no-deps api

            echo "==> Rebuilding and restarting Web..."
            docker compose build web
            docker compose up -d --no-deps web

            echo "==> Done! Containers status:"
            docker compose ps
