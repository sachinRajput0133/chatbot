worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/javascript;

    # Rate limiting zones
    limit_req_zone $http_x_bot_id zone=chat_per_bot:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=30r/m;

    upstream api {
        server api:8000;
    }

    upstream web {
        server web:3000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Public chat endpoint — rate limit per bot_id
        location ~ ^/api/chat/ {
            limit_req zone=chat_per_bot burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Allow streaming responses
            proxy_buffering off;
            proxy_read_timeout 60s;
        }

        # Widget.js — aggressive caching, no rate limit
        location ~ ^/widget/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=300";
        }

        # All other API routes — rate limit per IP
        location /api/ {
            limit_req zone=api_per_ip burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend dashboard
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
